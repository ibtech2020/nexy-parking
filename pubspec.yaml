name: nexy_parking
description: NexyParking - Fun car parking game for kids
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Game Engine
  flame: ^1.18.0
  flame_audio: ^2.1.1
  
  # Physics
  forge2d: ^0.12.2
  flame_forge2d: ^0.17.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Sensors (gyroscope/accelerometer)
  sensors_plus: ^4.0.2
  
  # Audio
  audioplayers: ^6.0.0
  
  # Haptics
  vibration: ^1.8.4
  
  # Storage / Persistence
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Firebase (optional - comment out if not using)
  # firebase_core: ^2.27.1
  # firebase_auth: ^4.17.9
  # cloud_firestore: ^4.15.10
  # firebase_analytics: ^10.8.10
  
  # Navigation
  go_router: ^14.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  
  # Utils
  collection: ^1.18.0
  vector_math: ^2.1.4
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/

